<body class="bg-background text-on-background font-body-md overflow-hidden">
<!-- Top Navigation (Shell Implementation) -->

<button class="flex items-center gap-xs px-md py-xs rounded-full bg-white/20 backdrop-blur-md text-on-primary font-label-md">

<!-- Full Screen Preview Canvas -->

<!-- Main Photo -->
<div class="absolute inset-0 w-full h-full">
<img alt="Rice Leaf Sample" class="w-full h-full object-cover opacity-90" data-alt="A macro photograph of a vibrant green rice leaf showing intricate vein patterns and small brownish lesions typical of rice blast disease. The image is captured with professional agricultural diagnostic clarity, featuring natural sunlight highlighting the leaf texture against a soft-focus background of a lush rice field. The color palette is dominated by deep forest greens and organic earthy tones, reflecting the reliable and observant brand identity of RiceGuard." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6c7h-D6DwFldcBTUHFj9ckbgINhM4vxzRwpQq0XhnuZIAFClHFdTR25UJQAMzHyyCupORv0uSaJV9J2Iq-FtZrfbjMi0-LLzVkt572KV1tgt1L2yWI5yOjNXHjmZHcLQod_C5nhZvUJ1hhOekDYoDALCKmJLLPFolFFFv9ukwwfWqE9oItvcJDnqWeOzsvzxM5wT1YFQLar9C17xnmYV4M0RdLDGz4boCTyCe1m9f-Dcl-LDmvyj2W5beCBYbexwHhrCcSpx_gVga"/>

<div class="absolute top-24 right-container-margin flex flex-col gap-md">

</button>

<!-- Bottom Sheet Container -->

      </p>

<script>
    // Simple micro-interaction for the analyze button
    const analyzeBtn = document.querySelector('.bg-primary-container');
    analyzeBtn.addEventListener('click', () => {
      analyzeBtn.innerHTML = `
        <div class="flex items-center gap-sm">
          <svg class="animate-spin h-5 w-5 text-on-primary-container" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <div class="flex flex-col items-start">
            <span class="text-label-md font-bold">Processing...</span>
            <span class="text-[10px] opacity-70">প্রক্রিয়া করা হচ্ছে...</span>
          </div>
        </div>
      `;
      analyzeBtn.classList.add('opacity-80');
      analyzeBtn.disabled = true;
      
      // Navigate or trigger success state (simulated)
      setTimeout(() => {
        analyzeBtn.innerHTML = '<span class="text-label-md font-bold">Done!</span>';
      }, 2000);
    });

    // Subtle parallax effect on move
    window.addEventListener('mousemove', (e) => {
      const img = document.querySelector('img');
      const x = (window.innerWidth - e.pageX * 2) / 100;
      const y = (window.innerHeight - e.pageY * 2) / 100;
      img.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
    });
  </script>
