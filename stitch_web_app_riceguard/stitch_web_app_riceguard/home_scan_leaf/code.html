<style>

            70% { border-color: #2D6A4F; box-shadow: 0 0 0 15px rgba(116, 198, 157, 0); }

<div class="flex items-center gap-sm">

<button class="px-3 py-1 border-2 border-outline-variant rounded-xl text-label-md font-label-md text-primary hover:bg-surface-container-highest transition-colors active:scale-95 duration-100">

            </p>
</section>

<span class="material-symbols-outlined text-on-primary text-5xl" data-icon="leafy_green">energy_savings_leaf</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-primary mb-xs">Start Camera Scan</h3>

</div>
</div>
</div>
</section>

<span class="material-symbols-outlined text-on-secondary-container" data-icon="history">history</span>
</div>

<script>
        // Micro-interaction for language switch feedback
        const langBtn = document.querySelector('header button');
        langBtn.addEventListener('click', () => {
            const current = langBtn.innerText;
            langBtn.innerText = current === 'EN/BN' ? 'বাং/EN' : 'EN/BN';
        });

        // Simple haptic-like animation for the scan zone
        const scanZone = document.querySelector('.pulsing-border');
        scanZone.addEventListener('mousedown', () => {
            scanZone.style.transform = 'scale(0.98)';
        });
        scanZone.addEventListener('mouseup', () => {
            scanZone.style.transform = 'scale(1)';
        });
    </script>
