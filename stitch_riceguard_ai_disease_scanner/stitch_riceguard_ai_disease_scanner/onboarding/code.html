<!-- Interactive script for carousel sync -->
<script>
        const carousel = document.getElementById('carousel');
        const dots = [
            document.getElementById('dot-0'),
            document.getElementById('dot-1'),
            document.getElementById('dot-2')
        ];

        carousel.addEventListener('scroll', () => {
            const scrollLeft = carousel.scrollLeft;
            const width = carousel.offsetWidth;
            const activeIndex = Math.round(scrollLeft / width);

            dots.forEach((dot, index) => {
                if (index === activeIndex) {
                    dot.classList.remove('bg-outline-variant', 'w-2.5');
                    dot.classList.add('bg-primary-container', 'w-6');
                } else {
                    dot.classList.remove('bg-primary-container', 'w-6');
                    dot.classList.add('bg-outline-variant', 'w-2.5');
                }
            });
        });

        // Initialize first dot
        dots[0].classList.add('w-6');
    </script>
